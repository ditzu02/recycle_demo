<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="site-brand">
          <p class="eyebrow">Distributed edge-AI monitoring</p>
          <h1>Recycle Brain</h1>
          <p class="page-title">{{ page_name }}</p>
          <p class="subtitle">{{ page_description }}</p>
        </div>
        <nav class="site-nav">
          <a href="/" class="{% if active_page == 'overview' %}active{% endif %}">Overview</a>
          <a href="/events" class="{% if active_page == 'events' %}active{% endif %}">Events</a>
          <a href="/api" class="{% if active_page == 'api' %}active{% endif %}">API</a>
        </nav>
      </header>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
