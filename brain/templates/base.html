<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <script>
      (function () {
        var key = "brain-ui-theme";
        var stored = "";
        try {
          stored = window.localStorage.getItem(key) || "";
        } catch (error) {
          stored = "";
        }
        var prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
        var theme = stored === "light" || stored === "dark" ? stored : prefersLight ? "light" : "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <div class="page-shell" data-page-key="{{ active_page }}">
      <header class="site-header">
        <div class="site-headline" aria-label="Current workspace">
          <span class="brand-mark" aria-hidden="true">RB</span>
          <div class="title-stack">
            <p class="app-label">Recycle Brain</p>
            <p class="page-title" id="page-name">{{ page_name }}</p>
          </div>
          <p id="page-description" hidden>{{ page_description }}</p>
        </div>
        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary navigation">
            <a href="/" data-page="overview" class="{% if active_page == 'overview' %}active{% endif %}" {% if active_page == 'overview' %}aria-current="page"{% endif %}>Overview</a>
            <a href="/events" data-page="events" class="{% if active_page == 'events' %}active{% endif %}" {% if active_page == 'events' %}aria-current="page"{% endif %}>Events</a>
            <a href="/api" data-page="api" class="{% if active_page == 'api' %}active{% endif %}" {% if active_page == 'api' %}aria-current="page"{% endif %}>System</a>
          </nav>
          <button class="theme-toggle" type="button" data-theme-toggle role="switch" aria-label="Switch theme" aria-checked="false">
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-indicator"></span>
            </span>
            <span class="theme-toggle-text" data-theme-label>Dark</span>
          </button>
        </div>
      </header>
      <main id="page-content" data-page-key="{{ active_page }}">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
